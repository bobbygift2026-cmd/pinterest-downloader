name: دانلود ویدیو از پینترست

on:
  workflow_dispatch:
    inputs:
      pin_url:
        description: 'آدرس پین Pinterest (ویدیو)'
        required: true
        default: 'https://www.pinterest.com/pin/XXXXXX/'

jobs:
  download-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install yt-dlp
        run: |
          pip install yt-dlp
      
      - name: Create video download script
        run: |
          cat > download_video.py << 'EOF'
          import subprocess
          import sys
          import re
          import os
          
          def download_pinterest_video(pin_url):
              """
              دانلود ویدیو از پینترست با استفاده از yt-dlp
              yt-dlp از پینترست، یوتیوب، اینستاگرام و صدها سایت دیگر پشتیبانی می‌کند
              """
              print("=" * 60)
              print("🎬 Pinterest Video Downloader")
              print("=" * 60)
              print(f"🔗 آدرس: {pin_url}")
              print()
              
              # استخراج شناسه پین برای نام فایل
              pin_match = re.search(r'/pin/(\d+)', pin_url)
              if not pin_match:
                  pin_match = re.search(r'pin\.it/([A-Za-z0-9]+)', pin_url)
              
              if pin_match:
                  pin_id = pin_match.group(1)
                  output_template = f"{pin_id}.%(ext)s"
              else:
                  output_template = "pinterest_video.%(ext)s"
              
              # دستور yt-dlp برای دانلود بهترین کیفیت
              cmd = [
                  "yt-dlp",
                  "-f", "best",           # بهترین کیفیت موجود
                  "-o", output_template,  # نام فایل خروجی
                  "--no-playlist",        # فقط همین ویدیو، نه کل لیست
                  pin_url
              ]
              
              print("📥 در حال دانلود ویدیو...")
              print("   (این عملیات ممکن است چند ثانیه طول بکشد)")
              print()
              
              try:
                  # اجرای دانلود
                  result = subprocess.run(cmd, capture_output=True, text=True)
                  
                  if result.returncode == 0:
                      # پیدا کردن فایل دانلود شده
                      for file in os.listdir('.'):
                          if file.startswith(pin_match.group(1) if pin_match else 'pinterest_video'):
                              file_size = os.path.getsize(file)
                              size_mb = file_size / (1024 * 1024)
                              
                              print()
                              print("=" * 60)
                              print("✅ دانلود کامل شد!")
                              print(f"📁 فایل: {file}")
                              print(f"📦 حجم: {size_mb:.2f} MB")
                              print("=" * 60)
                              
                              # ذخیره نام فایل برای آپلود
                              with open('video_filename.txt', 'w') as f:
                                  f.write(file)
                              return True
                  else:
                      print("❌ خطا در دانلود!")
                      print(f"   {result.stderr}")
                      return False
                      
              except Exception as e:
                  print(f"❌ خطا: {e}")
                  return False
          
          if __name__ == "__main__":
              if len(sys.argv) < 2:
                  print("❗ نحوه استفاده: python download_video.py 'PIN_URL'")
                  sys.exit(1)
              
              pin_url = sys.argv[1]
              success = download_pinterest_video(pin_url)
              sys.exit(0 if success else 1)
          EOF
      
      - name: Run video downloader
        run: |
          python download_video.py "${{ github.event.inputs.pin_url }}"
      
      - name: Upload video file
        uses: actions/upload-artifact@v4
        with:
          name: pinterest-video
          path: |
            *.mp4
            *.webm
            *.mkv
            *.mov
          if-no-files-found: error
