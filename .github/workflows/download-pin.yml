name: دانلود از پینترست

on:
  workflow_dispatch:
    inputs:
      pin_url:
        description: 'آدرس پین Pinterest'
        required: true
        default: 'https://pin.it/XXXXXX'
        type: string

jobs:
  download-pin:
    runs-on: ubuntu-latest
    
    steps:
      # مرحله 1: دریافت کدهای مخزن
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # مرحله 2: نصب پایتون
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # مرحله 3: نصب کتابخانه aiohttp (برای دانلود)
      - name: Install dependencies
        run: |
          pip install aiohttp
      
      # مرحله 4: ساخت اسکریپت پایتونی در همان لحظه
      - name: Create download script
        run: |
          cat > download_pin.py << 'EOF'
          import aiohttp
          import asyncio
          import sys
          import re
          import os
          
          async def download_pin(pin_url):
              # استخراج شناسه پین
              pin_match = re.search(r'pin\.it/([A-Za-z0-9]+)', pin_url)
              if not pin_match:
                  pin_match = re.search(r'/pin/(\d+)', pin_url)
              
              if not pin_match:
                  print("❌ لینک معتبر نیست")
                  return None
              
              pin_id = pin_match.group(1)
              print(f"🔍 شناسه پین: {pin_id}")
              
              # آدرس مستقیم تصویر (از CDN پینترست)
              # توجه: پینترست ساختار مستقیمی دارد، می‌توانیم از فرمت زیر استفاده کنیم
              # اما برای دقت بیشتر، از API تقلبی استفاده نمی‌کنیم
              
              # روش ساده: استفاده از فرمت مستقیم CDN
              image_url = f"https://i.pinimg.com/originals/{pin_id[0]}/{pin_id[1]}/{pin_id[2]}/{pin_id}.jpg"
              
              async with aiohttp.ClientSession() as session:
                  try:
                      async with session.get(image_url) as resp:
                          if resp.status == 200:
                              filename = f"{pin_id}.jpg"
                              with open(filename, 'wb') as f:
                                  f.write(await resp.read())
                              print(f"✅ دانلود شد: {filename}")
                              return filename
                          else:
                              print("🔄 تلاش با فرمت دیگر...")
                              # فرمت جایگزین
                              alt_url = f"https://i.pinimg.com/736x/{pin_id[0]}/{pin_id[1]}/{pin_id[2]}/{pin_id}.jpg"
                              async with session.get(alt_url) as resp2:
                                  if resp2.status == 200:
                                      filename = f"{pin_id}.jpg"
                                      with open(filename, 'wb') as f:
                                          f.write(await resp2.read())
                                      print(f"✅ دانلود شد: {filename}")
                                      return filename
                                  else:
                                      print("❌ تصویر یافت نشد")
                                      return None
                  except Exception as e:
                      print(f"❌ خطا: {e}")
                      return None
          
          async def main():
              if len(sys.argv) < 2:
                  print("لطفاً آدرس پین را وارد کنید")
                  return None
              
              pin_url = sys.argv[1]
              return await download_pin(pin_url)
          
          if __name__ == "__main__":
              filename = asyncio.run(main())
              if filename:
                  print(f"SUCCESS_FILE={filename}")
              else:
                  sys.exit(1)
          EOF
      
      # مرحله 5: اجرای اسکریپت
      - name: Run downloader
        id: download
        run: |
          python download_pin.py "${{ github.event.inputs.pin_url }}"
      
      # مرحله 6: آپلود فایل دانلود شده به عنوان Artifact
      - name: Upload downloaded file
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-pin
          path: "*.jpg"
          if-no-files-found: error
