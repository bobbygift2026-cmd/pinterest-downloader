name: Cleanup Old Artifacts

on:
  schedule:
    - cron: '0 3 * * *'

  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old artifacts
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '3 days'
          skip-recent: 5
